name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk terminal-app-debug.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Terminal App ${{ github.ref_name }}
          files: terminal-app-debug.apk
          body: |
            First APK release of Terminal App.

            Features:
            - SSH quick command buttons for the VPS
            - SFTP file listing
            - Dedicated Codex prompt screen using unrestricted Codex exec settings
            - Runtime credential entry; VPS password is not stored in the repository
